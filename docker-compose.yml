# 安心用药 Demo - 火山引擎部署
# 使用：docker compose up -d --build
# 访问：http://<服务器公网IP>:8787

services:
  anxin-medication:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anxin-medication
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8787
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
